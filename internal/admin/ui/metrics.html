<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>llm-proxy · metrics</title>
<link rel="stylesheet" href="vendor/element-plus.css" />
<link rel="stylesheet" href="styles.css" />
</head>
<body class="admin-body">
<div id="app" v-cloak>
  <div class="admin-shell">
    <header class="admin-topbar">
      <div class="brand-block">
        <div class="brand-mark">LP</div>
        <div>
          <p class="brand-kicker">Admin Console</p>
          <h1>llm-proxy</h1>
        </div>
      </div>

      <nav class="top-nav">
        <a href="/ui/">Providers</a>
        <a href="/ui/users.html">Users</a>
        <a href="/ui/metrics.html" class="active">Metrics</a>
      </nav>

      <div class="topbar-actions compact">
        <div class="refresh-pill">
          <span>自动刷新</span>
          <el-switch v-model="autoRefresh"></el-switch>
        </div>
        <el-button
          v-if="authEnabled"
          id="logout"
          class="logout-button"
          plain
          @click="logout"
        >
          登出
        </el-button>
      </div>
    </header>

    <main class="page-stack">
      <section class="hero-section">
        <div>
          <p class="section-kicker">Service Metrics</p>
          <h2>更直观地查看流量状态与 token 消耗</h2>
          <p class="section-copy">聚焦运行时最常看的指标，把总请求量、成功率、错误响应和 token 使用情况放在更容易扫读的卡片和表格里。</p>
        </div>
        <div class="hero-side-note">
          <div class="soft-meta">最近更新时间</div>
          <strong>{{ lastUpdatedText }}</strong>
        </div>
      </section>

      <el-alert
        v-if="loadError"
        :title="loadError"
        type="error"
        show-icon
        :closable="false"
        class="inline-alert"
      ></el-alert>

      <section class="stats-grid">
        <el-card v-for="card in overviewCards" :key="card.label" shadow="never" class="metric-card">
          <p class="metric-label">{{ card.label }}</p>
          <div class="metric-value">{{ card.value }}</div>
          <p class="metric-meta">{{ card.meta }}</p>
        </el-card>
      </section>

      <section class="split-grid">
        <el-card shadow="never" class="panel-card">
          <template #header>
            <div class="panel-head">
              <div>
                <p class="section-kicker">Responses</p>
                <h3>按状态码</h3>
              </div>
            </div>
          </template>

          <el-table :data="statusRows" stripe class="data-table" empty-text="暂无状态码数据">
            <el-table-column label="Status" width="140">
              <template #default="{ row }">
                <el-tag :type="row.tagType" round>{{ row.status }}</el-tag>
              </template>
            </el-table-column>
            <el-table-column prop="count" label="Count"></el-table-column>
          </el-table>
        </el-card>

        <el-card shadow="never" class="panel-card">
          <template #header>
            <div class="panel-head">
              <div>
                <p class="section-kicker">Token Usage</p>
                <h3>按 Provider 的 Token 使用</h3>
              </div>
            </div>
          </template>

          <el-alert
            v-if="tokenRows.length === 0"
            title="还没有记录 token。要记录需要在全局或 provider 级别启用 token_counting。"
            type="info"
            show-icon
            :closable="false"
            class="inline-alert"
          ></el-alert>

          <el-table :data="tokenRows" stripe class="data-table" empty-text="暂无 token 数据">
            <el-table-column label="Provider" min-width="220">
              <template #default="{ row }">
                <div class="table-primary">{{ row.provider }}</div>
                <div class="table-secondary">累计调用量已纳入统计</div>
              </template>
            </el-table-column>
            <el-table-column prop="prompt" label="Prompt" min-width="120"></el-table-column>
            <el-table-column prop="completion" label="Completion" min-width="120"></el-table-column>
            <el-table-column prop="total" label="Total" min-width="120"></el-table-column>
          </el-table>
        </el-card>
      </section>

      <el-card shadow="never" class="panel-card">
        <template #header>
          <div class="panel-head">
            <div>
              <p class="section-kicker">Per-user Usage</p>
              <h3>按用户的请求与 token 用量</h3>
              <p class="section-copy soft-meta">来自 SQLite usage_records 的聚合，受 storage.usage_retention_days 保留窗口约束。</p>
            </div>
            <div class="panel-head-actions">
              <el-select v-model="usageWindow" @change="refreshUsage" size="default" style="width: 120px">
                <el-option label="24 小时" value="24h"></el-option>
                <el-option label="7 天" value="7d"></el-option>
                <el-option label="30 天" value="30d"></el-option>
                <el-option label="90 天" value="90d"></el-option>
              </el-select>
            </div>
          </div>
        </template>

        <el-alert
          v-if="usageError"
          :title="usageError"
          type="error"
          show-icon
          :closable="false"
          class="inline-alert"
        ></el-alert>

        <el-table
          :data="usageUserRows"
          stripe
          class="data-table"
          empty-text="窗口内没有用户使用记录"
        >
          <el-table-column label="User" min-width="200">
            <template #default="{ row }">
              <div class="table-primary">{{ row.user_name }}</div>
              <div class="table-secondary">ID {{ row.user_id }}</div>
            </template>
          </el-table-column>
          <el-table-column prop="requestsText" label="Requests" min-width="120"></el-table-column>
          <el-table-column prop="promptText" label="Prompt" min-width="120"></el-table-column>
          <el-table-column prop="completionText" label="Completion" min-width="120"></el-table-column>
          <el-table-column prop="totalText" label="Total" min-width="120"></el-table-column>
        </el-table>
      </el-card>

      <el-card shadow="never" class="panel-card">
        <template #header>
          <div class="panel-head">
            <div>
              <p class="section-kicker">Per-provider Usage</p>
              <h3>按 provider 在所选窗口内的用量</h3>
            </div>
          </div>
        </template>
        <el-table
          :data="usageProviderRows"
          stripe
          class="data-table"
          empty-text="窗口内没有 provider 使用记录"
        >
          <el-table-column prop="provider" label="Provider" min-width="220"></el-table-column>
          <el-table-column prop="requestsText" label="Requests" min-width="120"></el-table-column>
          <el-table-column prop="promptText" label="Prompt" min-width="120"></el-table-column>
          <el-table-column prop="completionText" label="Completion" min-width="120"></el-table-column>
          <el-table-column prop="totalText" label="Total" min-width="120"></el-table-column>
        </el-table>
      </el-card>

      <el-card shadow="never" class="panel-card">
        <template #header>
          <div class="panel-head">
            <div>
              <p class="section-kicker">Prometheus</p>
              <h3>原始输出</h3>
            </div>
            <el-button plain @click="refresh" :loading="loading">立即刷新</el-button>
          </div>
        </template>

        <pre class="prom-block">{{ rawProm }}</pre>
      </el-card>
    </main>
  </div>
</div>

<script src="vendor/vue.global.prod.js"></script>
<script src="vendor/element-plus.full.min.js"></script>
<script src="common.js"></script>
<script src="metrics.js"></script>
</body>
</html>
