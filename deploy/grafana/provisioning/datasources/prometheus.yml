apiVersion: 1

datasources:
  # uid is pinned so dashboards can reference this datasource by a stable
  # identifier ("prometheus") rather than Grafana's auto-generated hash.
  - name: Prometheus
    uid: prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      timeInterval: 15s
