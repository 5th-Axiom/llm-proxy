services:
  prometheus:
    image: prom/prometheus:v2.55.0
    # Bind to loopback so the TSDB and scrape config are not reachable from
    # other hosts. Port-forward via SSH if you need the UI remotely. Host
    # port can be overridden via PROMETHEUS_PORT when 9090 is taken.
    ports:
      - "127.0.0.1:${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./prometheus:/etc/prometheus:ro
      - prometheus-data:/prometheus
    # host.docker.internal resolves to the host machine on Docker Desktop
    # (macOS / Windows) natively, and needs this extra_hosts entry on Linux.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
      - --web.console.libraries=/usr/share/prometheus/console_libraries
      - --web.console.templates=/usr/share/prometheus/consoles
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.3.0
    ports:
      - "127.0.0.1:${GRAFANA_PORT:-3000}:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    environment:
      # Anonymous browsing keeps the first-run setup simple; the port is on
      # loopback so access is gated by OS-level boundaries. Swap these for
      # real credentials if you expose Grafana beyond the host.
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - GF_AUTH_DISABLE_LOGIN_FORM=false
      - GF_SECURITY_ADMIN_PASSWORD=${GF_ADMIN_PASSWORD:-admin}
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  prometheus-data:
  grafana-data:
