server:
  listen: ":8080"
  # /metrics and the admin UI live on this loopback listener so provider
  # names and token usage are not exposed on the public listener.
  metrics_listen: "127.0.0.1:8081"
  tokens:
    - "proxy-token-1"
    - "proxy-token-2"

# Admin auth. Leave password_hash empty to keep the admin UI open (appropriate
# when the loopback listener is your only trust boundary). To require login,
# generate a hash via `./llm-proxy -hash-password` (reads password from stdin)
# and paste it here.
#
# metrics_bearer_token lets a scraper (Prometheus) pull /metrics with
# `Authorization: Bearer <token>` without a session cookie — keep it separate
# from server.tokens so rotating the scrape credential does not disrupt
# proxy clients. See deploy/ for a ready-made Prometheus + Grafana stack.
# admin:
#   password_hash: "pbkdf2-sha256$210000$...$..."
#   session_ttl_min: 720  # 12h default
#   metrics_bearer_token: "long-random-string-for-prometheus"

transport:
  max_idle_conns: 512
  max_idle_conns_per_host: 128
  max_conns_per_host: 0
  idle_conn_timeout_sec: 90

# Token counting: estimate prompt tokens and extract usage from responses.
# When enabled, token counts are recorded in /metrics and request logs.
# Each provider can override with token_counting: true | false.
token_counting:
  enabled: false

providers:
  - name: "openai-main"
    type: "openai"
    base_path: "/openai"
    upstream_base_url: "https://api.openai.com/v1"
    upstream_api_key: "${OPENAI_API_KEY}"
    # token_counting: true

  - name: "glm-prod"
    type: "openai"
    base_path: "/glm"
    upstream_base_url: "https://open.bigmodel.cn/api/coding/paas/v4"
    upstream_api_key: "${GLM_API_KEY}"

  - name: "claude-main"
    type: "anthropic"
    base_path: "/anthropic"
    upstream_base_url: "https://api.anthropic.com"
    upstream_api_key: "${ANTHROPIC_API_KEY}"
    upstream_headers:
      anthropic-version: "2023-06-01"
